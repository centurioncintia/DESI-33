<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Listado de Propiedades</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>
<body>

<div class="container mt-4">

    <h2>Propiedades</h2>

    <a th:href="@{/propiedades/nuevo}"
       class="btn btn-primary mb-3">
       Nueva Propiedad
    </a>

    <table class="table table-bordered">

        <thead>
            <tr>
                <th>ID</th>
                <th>Dirección</th>
                <th>Ciudad</th>
                <th>Tipo</th>
                <th>Estado</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="p : ${propiedades}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.direccion}"></td>
                <td th:text="${p.ciudad}"></td>
                <td th:text="${p.tipoPropiedad}"></td>
                <td th:text="${p.estado}"></td>
            </tr>
        </tbody>

    </table>

</div>

</body>
</html>
