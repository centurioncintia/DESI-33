<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Nueva Persona</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Alta Persona</h2>

    <form th:action="@{/personas/guardar}"
          th:object="${persona}"
          method="post">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text"
                   th:field="*{nombre}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Apellido</label>
            <input type="text"
                   th:field="*{apellido}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">DNI</label>
            <input type="text"
                   th:field="*{dni}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   th:field="*{email}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text"
                   th:field="*{telefono}"
                   class="form-control">
        </div>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a th:href="@{/personas}" class="btn btn-secondary">
            Volver
        </a>

    </form>

</div>

</body>
</html>
