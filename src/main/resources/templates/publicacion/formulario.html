<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Publicación</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h1 th:text="${publicacion.id == null ? 'Nueva Publicación' : 'Editar Publicación'}"></h1>

    <form th:action="@{/publicaciones/guardar}"
          th:object="${publicacion}"
          method="post">

        <input type="hidden" th:field="*{id}"/>

        <div class="mb-3">
            <label class="form-label">Precio mensual</label>
            <input type="number"
                   step="0.01"
                   class="form-control"
                   th:field="*{precioMensual}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Condiciones</label>
            <input type="text"
                   class="form-control"
                   th:field="*{condiciones}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea class="form-control"
                      rows="4"
                      th:field="*{descripcion}"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de publicación</label>
            <input type="date"
                   class="form-control"
                   th:field="*{fechaPublicacion}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <select class="form-select"
                    th:field="*{estado}">
                <option value="">Seleccione...</option>
                <option th:each="e : ${T(com.hogarya.enums.EstadoPublicacion).values()}"
                        th:value="${e}"
                        th:text="${e}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Propiedad</label>

            <select class="form-select"
                    name="propiedadId"
                    required>

                <option value="">Seleccione una propiedad</option>

                <option th:each="p : ${propiedades}"
                        th:value="${p.id}"
                        th:text="${p.direccion}"
                        th:selected="${publicacion.propiedad != null && publicacion.propiedad.id == p.id}">
                </option>

            </select>
        </div>

        <button type="submit" class="btn btn-primary">
            Guardar
        </button>

        <a th:href="@{/publicaciones}" class="btn btn-secondary">
            Cancelar
        </a>

    </form>

</div>

</body>
</html>
