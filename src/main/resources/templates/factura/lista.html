<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Listado de Facturas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Facturas</h2>

    <!-- alerta error -->
    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <!-- alerta exito -->
    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <a th:href="@{/facturas/nuevo}" class="btn btn-primary mb-3">
        Nueva Factura
    </a>
    <a th:href="@{/}" class="btn btn-success mb-3">
        Menu de Inicio
    </a>
    

    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>ID</th>
                <th>Contrato</th>
                <th>Propiedad</th>
                <th>Inquilino</th>
                <th>Fecha de emisión</th>
                <th>Fecha de vencimiento</th>
                <th>Importe</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="f : ${facturas}">

                <td th:text="${f.id}"></td>
                <td th:text="${f.contrato != null ? '#' + f.contrato.id : ''}"></td>
                <td th:text="${f.contrato != null and f.contrato.propiedad != null ? f.contrato.propiedad.direccion : ''}"></td>
                <td th:text="${f.contrato != null and f.contrato.inquilino != null
                                ? f.contrato.inquilino.nombre + ' ' + f.contrato.inquilino.apellido
                                : ''}"></td>
                <td th:text="${f.fechaEmision}"></td>
                <td th:text="${f.fechaVencimiento}"></td>
                <td th:text="${f.importe}"></td>
                <td th:text="${f.estado}"></td>

                <td>
                    <a th:href="@{/facturas/editar/{id}(id=${f.id})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a th:href="@{/facturas/eliminar/{id}(id=${f.id})}"
                       class="btn btn-danger btn-sm"
                       th:if="${f.estado.name() != 'PAGADA'}"
                       onclick="return confirm('¿Seguro que querés eliminar esta factura?');">
                        Eliminar
                    </a>
                </td>

            </tr>

        </tbody>

    </table>

    <a th:href="@{/}" class="btn btn-secondary">Volver</a>

</div>

</body>
</html>
