<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title th:text="${modoEdicion} ? 'Editar Factura' : 'Nueva Factura'"></title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <div th:if="${error}" class="alert alert-danger">
        <p th:text="${error}"></p>
    </div>

    <h2 th:text="${modoEdicion} ? 'Editar Factura' : 'Nueva Factura'"></h2>

    <form th:action="${modoEdicion} ? @{/facturas/actualizar/{id}(id=${factura.id})} : @{/facturas/guardar}"
          th:object="${factura}"
          method="post">

        <div class="mb-3" th:if="${modoEdicion}">
            <label class="form-label">Identificador</label>
            <input type="text" th:value="${factura.id}" class="form-control" readonly>
        </div>

        <div class="mb-3" th:unless="${modoEdicion}">
            <label class="form-label">Contrato</label>
            <select name="contratoId" class="form-control">
                <option value="">-- Seleccionar --</option>
                <option th:each="c : ${contratosDisponibles}"
                        th:value="${c.id}"
                        th:text="${'#' + c.id + ' - ' + (c.propiedad != null ? c.propiedad.direccion : '') + ' / ' + (c.inquilino != null ? c.inquilino.nombre + ' ' + c.inquilino.apellido : '')}">
                </option>
            </select>
        </div>

        <div class="mb-3" th:if="${modoEdicion}">
            <label class="form-label">Contrato</label>
            <input type="text"
                   th:value="${'#' + factura.contrato.id + ' - ' + (factura.contrato.propiedad != null ? factura.contrato.propiedad.direccion : '')}"
                   class="form-control" readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Concepto facturado</label>
            <input type="text" th:field="*{conceptoFacturado}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de emisión</label>
            <input type="date" th:field="*{fechaEmision}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de vencimiento</label>
            <input type="date" th:field="*{fechaVencimiento}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Importe</label>
            <input type="number" step="0.01" min="0.01" th:field="*{importe}" class="form-control">
        </div>

        <div class="mb-3" th:if="${modoEdicion}">
            <label class="form-label">Estado</label>
            <select th:field="*{estado}" class="form-control">
                <option th:each="e : ${estados}"
                        th:value="${e}"
                        th:text="${e}">
                </option>
            </select>
        </div>

        <div th:if="${modoEdicion}">

            <hr>
            <h5>Datos de pago</h5>
            <p class="text-muted">Completar solo si la factura pasa a estado "PAGADA".</p>

            <div class="mb-3">
                <label class="form-label">Fecha de pago</label>
                <input type="date" th:field="*{fechaPago}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Medio de pago</label>
                <select th:field="*{medioPago}" class="form-control">
                    <option value="">-- Seleccionar --</option>
                    <option th:each="m : ${medios}"
                            th:value="${m}"
                            th:text="${m}">
                    </option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Importe pagado</label>
                <input type="number" step="0.01" min="0.01" th:field="*{importePagado}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Interés pagado</label>
                <input type="number" step="0.01" min="0" th:field="*{interesPagado}" class="form-control">
            </div>

        </div>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a th:href="@{/facturas}" class="btn btn-secondary">
            Volver
        </a>

    </form>

</div>

</body>
</html>
