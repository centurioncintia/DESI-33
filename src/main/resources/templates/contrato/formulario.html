<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title th:text="${modoEdicion} ? 'Editar Contrato' : 'Nuevo Contrato'"></title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <div th:if="${error}" class="alert alert-danger">
        <p th:text="${error}"></p>
    </div>

    <h2 th:text="${modoEdicion} ? 'Editar Contrato' : 'Nuevo Contrato'"></h2>

    <form th:action="${modoEdicion} ? @{/contratos/actualizar/{id}(id=${contrato.id})} : @{/contratos/guardar}"
          th:object="${contrato}"
          method="post">

        <div class="mb-3" th:if="${modoEdicion}">
            <label class="form-label">Identificador</label>
            <input type="text" th:value="${contrato.id}" class="form-control" readonly>
        </div>

        <div class="mb-3">
            <label class="form-label">Propiedad</label>
            <select name="propiedadId" class="form-control">
                <option value="">-- Seleccionar --</option>
                <option th:each="p : ${propiedades}"
                        th:value="${p.id}"
                        th:selected="${contrato.propiedad != null and contrato.propiedad.id == p.id}"
                        th:text="${p.direccion}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Inquilino</label>
            <select name="inquilinoId" class="form-control">
                <option value="">-- Seleccionar --</option>
                <option th:each="i : ${inquilinos}"
                        th:value="${i.id}"
                        th:selected="${contrato.inquilino != null and contrato.inquilino.id == i.id}"
                        th:text="${i.nombre + ' ' + i.apellido}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Fecha de inicio</label>
            <input type="date" th:field="*{fechaInicio}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Importe mensual</label>
            <input type="number" step="0.01" min="0.01" th:field="*{importeMensual}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Día de vencimiento mensual</label>
            <input type="date" th:field="*{diaVencimiento}" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Descripción</label>
            <textarea th:field="*{descripcion}" class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado</label>
            <select th:field="*{estado}" class="form-control">
                <option th:each="e : ${estados}"
                        th:value="${e}"
                        th:text="${e}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a th:href="@{/contratos}" class="btn btn-secondary">
            Volver
        </a>

    </form>

</div>

</body>
</html>
