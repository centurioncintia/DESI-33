<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Listado de Contratos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Contratos</h2>

    <!-- MENSAJE DE ERROR -->
    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <!-- MENSAJE DE ÉXITO -->
    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <a th:href="@{/contratos/nuevo}" class="btn btn-primary mb-3">
        Nuevo Contrato
    </a>


    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>ID</th>
                <th>Propiedad</th>
                <th>Propietario</th>
                <th>Inquilino</th>
                <th>Fecha de inicio</th>
                <th>Importe mensual</th>
                <th>Día de vencimiento</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="c : ${contratos}">

                <td th:text="${c.id}"></td>
                <td th:text="${c.propiedad != null ? c.propiedad.direccion : ''}"></td>
                <td th:text="${c.propiedad != null and c.propiedad.propietario != null
                                ? c.propiedad.propietario.nombre + ' ' + c.propiedad.propietario.apellido
                                : ''}"></td>
                <td th:text="${c.inquilino != null ? c.inquilino.nombre + ' ' + c.inquilino.apellido : ''}"></td>
                <td th:text="${c.fechaInicio}"></td>
                <td th:text="${c.importeMensual}"></td>
                <td th:text="${c.diaVencimiento}"></td>
                <td th:text="${c.estado}"></td>

                <td>
                    <a th:href="@{/contratos/editar/{id}(id=${c.id})}"
                       class="btn btn-warning btn-sm">
                        Editar
                    </a>

                    <a th:href="@{/contratos/eliminar/{id}(id=${c.id})}"
                       class="btn btn-danger btn-sm"
                       th:if="${c.estado.name() == 'BORRADOR'}"
                       onclick="return confirm('¿Seguro que querés eliminar este contrato?');">
                        Eliminar
                    </a>
                </td>

            </tr>

        </tbody>

    </table>

    <a th:href="@{/}" class="btn btn-secondary">Volver</a>

</div>

</body>
</html>
