<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Nueva Propiedad</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

</head>

<body>

<div class="container mt-4">

    <div th:if="${error}" class="alert alert-danger">
        <p th:text="${error}"></p>
    </div>

    <h2>Nueva Propiedad</h2>

    <form th:action="@{/propiedades/guardar}"
          th:object="${propiedad}"
          method="post">

        <div class="mb-3">
            <label>Dirección</label>
            <input type="text"
                   th:field="*{direccion}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Ciudad</label>
            <input type="text"
                   th:field="*{ciudad}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Tipo de Propiedad</label>
            <select th:field="*{tipoPropiedad}" class="form-control">
                <option value="CASA">Casa</option>
                <option value="DEPARTAMENTO">Departamento</option>
                <option value="LOCAL">Local</option>
                <option value="OTRO">Otro</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Ambientes</label>
            <input type="number"
                   th:field="*{ambientes}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Metros Cuadrados</label>
            <input type="number"
                   step="0.01"
                   th:field="*{metrosCuadrados}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Descripción</label>
            <textarea th:field="*{descripcion}"
                      class="form-control"></textarea>
        </div>

        <div class="mb-3">
            <label>Estado</label>
            <select th:field="*{estado}" class="form-control">
                <option value="DISPONIBLE">Disponible</option>
                <option value="RESERVADA">Reservada</option>
                <option value="ALQUILADA">Alquilada</option>
                <option value="INACTIVA">Inactiva</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Propietario</label>

            <select name="propietarioId" class="form-control">
                <option value="">-- Seleccionar --</option>

                <option th:each="p : ${propietarios}"
                        th:value="${p.id}"
                        th:text="${p.nombre + ' ' + p.apellido}">
                </option>

            </select>
        </div>

        <button type="submit" class="btn btn-success">
            Guardar
        </button>

        <a th:href="@{/propiedades}" class="btn btn-secondary">
            Volver
        </a>

    </form>

</div>

</body>
</html>
