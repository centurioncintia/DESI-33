<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Listado de Propiedades</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h2>Propiedades</h2>

    <!--  MENSAJE DE ERROR -->
    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <!-- MENSAJE DE ÉXITO -->
    <div th:if="${success}" class="alert alert-success">
        <span th:text="${success}"></span>
    </div>

    <a th:href="@{/propiedades/nuevo}"
       class="btn btn-primary mb-3">
        Nueva Propiedad
    </a>
    <a th:href="@{/}" class="btn btn-success mb-3">
        Menu de Inicio
    </a>

    <!-- TABLA ÚNICA (IMPORTANTE) -->
    <table class="table table-bordered table-striped">

        <thead>
            <tr>
                <th>ID</th>
                <th>Dirección</th>
                <th>Ciudad</th>
                <th>Tipo</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="p : ${propiedades}">

                <td th:text="${p.id}"></td>
                <td th:text="${p.direccion}"></td>
                <td th:text="${p.ciudad}"></td>
                <td th:text="${p.tipoPropiedad}"></td>
                <td th:text="${p.estado}"></td>

                <td>
                    <a th:href="@{/propiedades/eliminar/{id}(id=${p.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('¿Seguro que querés eliminar esta propiedad?');">
                        Eliminar
                    </a>
					
					<a th:href="@{/propiedades/editar/{id}(id=${p.id})}"
					   class="btn btn-warning btn-sm">
					   Editar
					</a>
					
					
                </td>

            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
