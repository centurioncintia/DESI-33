<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Listado de Publicaciones</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h1>Listado de Publicaciones</h1>

    <a th:href="@{/publicaciones/nuevo}" class="btn btn-success mb-3">
        Nueva Publicación
    </a>

    <table class="table table-bordered table-hover">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Condiciones</th>
            <th>Precio</th>
            <th>Fecha</th>
            <th>Propiedad</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="publicacion : ${publicaciones}">

            <td th:text="${publicacion.id}"></td>
            <td th:text="${publicacion.condiciones}"></td>
            <td th:text="${publicacion.precio}"></td>
            <td th:text="${publicacion.fechaPublicacion}"></td>
            <td th:text="${publicacion.propiedad.direccion}"></td>

            <td>

                <a th:href="@{/publicaciones/editar/{id}(id=${publicacion.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/publicaciones/eliminar/{id}(id=${publicacion.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Está seguro de eliminar esta publicación?')">
                    Eliminar
                </a>

            </td>

        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
